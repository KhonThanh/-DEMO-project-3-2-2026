<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 3-2-2026</title>
    <link rel="icon" type="image/png" href="./img/logo/CH_XUYEN_BANG-09_32x32.webp">
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css" />
    <link rel="stylesheet" href="./css/main.css">
</head>

<body>
    <main class="container-f flex flex-col center-hor">
        <section class="container-f flex center-ver container-full-view">
            <div class="auth-section container-xxs flex flex-col gap-10 center-ver" id="section-login">
                <div class="auth-section__logo">
                    <img src="./img/logo/logo-red.svg" alt="Logo">
                </div>

                <h3 class="auth-title">Nhập mã</h3>
                <p class="auth-desc">Đã gửi đến ABC@gmail.com</p>
                <form class="js-validate-form flex flex-col gap-10" data-form="login">
                    <div class="form-group flex">
                        <input type="text" name="register_code" inputmode="numeric" pattern="[0-9]*" maxlength="6"
                            autocomplete="one-time-code" placeholder="Nhập mã 6 số">
                        <small class="error-msg"></small>
                    </div>

                    <button type="submit">Gửi</button>
                </form>
                <a href="#" class="signin-with-other">Đăng ký với email khác</a>
            </div>
        </section>
    </main>
    <script type="text/javascript" src="https://code.jquery.com/jquery-1.11.0.min.js"></script>
    <script type="text/javascript" src="https://code.jquery.com/jquery-migrate-1.2.1.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>
    <script type="text/javascript" src="./js/frontend.js"></script>
</body>

</html>
